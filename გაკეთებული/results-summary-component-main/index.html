<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Results summary component</title>
</head>
<body>
    <div id="parent">
        <div id="d1">
            <h3>Your Result</h3>
            <div id="score">
                <span id="sp1">76</span>
                <span id="sp2">of 100</span>
            </div><br>
            <h2>Great</h2><br>
            <p>
                You scored higher than 65% of <br>
                the people who have taken <br>
                these tests.
            </p>
        </div>
        <div id="d2">
            <h3>Summary</h3>
            <div id="Reaction">
                <img src="./icon-reaction.svg">
                <span id="sr">Reaction</span>
                <span><b>80</b> / 100</span>
            </div><br>
            <div id="Memory">
                <img src="./icon-memory.svg">
                <span id="sm">Memory</span>
                <span><b>92</b> / 100</span>
            </div><br>
            <div id="Verbal">
                <img src="./icon-verbal.svg">
                <span id="sve">Verbal</span>
                <span><b>61</b> / 100</span>
            </div><br>
            <div id="Visual">
                <img src="./icon-visual.svg">
                <span id="svi">Visual</span>
                <span><b>73</b> / 100</span>
            </div><br>
            <button>Continue</button>
        </div>
    </div>
</body>
</html>
