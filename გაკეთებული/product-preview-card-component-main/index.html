<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
    <div id="d1">
        <div id="d2">
            <img src="./image-product-desktop.jpg" alt="product photo">
        </div>
        <div id="d3">
            <p id="p1">P E R F U M E</p><br>
            <h2 id="h1">Gabrielle<br>Essence Eau<br>De Parfum</h2> <br>
            <p id="p2">
                A floral, solar and voluptuous <br>
                interpretation composed by <br>
                Olivier Polge, Perfumer-Creator <br>
                for the House of CHANEL.
            </p><br>
            <div id="price">
                <h1>$149.99</h1><br>
                <h5>$169.99</h5>
            </div>
            <br>
            <button><img src="./icon-cart.svg">Add to Cart</button>
        </div>
    </div>
</body>
</html>
