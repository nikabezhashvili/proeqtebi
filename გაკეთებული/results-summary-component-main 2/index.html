<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="parent">
        <div id="d1">
            <h3>Your Result</h3>
            <div id="score">
                <span id="sp1">76</span>
                <span id="sp2">of 100</span>
            </div><br>
            <h2>Great</h2><br>
            <p>
                You scored higher than 65% of 
                the people who have taken 
                these tests.
            </p>
        </div>
        <div id="d2">
            <h3>Summary</h3>
            <div id="Reaction" class="rmvv">
                <img src="./icon-reaction.svg">
                <span id="sr">Reaction</span>
                <span><b>80</b> <b class="ravi">/ 100</b></span>
            </div>
            <div id="Memory" class="rmvv">
                <img src="./icon-memory.svg">
                <span id="sm">Memory</span>
                <span><b>92</b> <b class="ravi">/ 100</b></span>
            </div>
            <div id="Verbal" class="rmvv">
                <img src="./icon-verbal.svg">
                <span id="sve">Verbal</span>
                <span><b>61</b> <b class="ravi">/ 100</b></span>
            </div>
            <div id="Visual" class="rmvv">
                <img src="./icon-visual.svg">
                <span id="svi">Visual</span>
                <span><b>73</b> <b class="ravi">/ 100</b></span>
            </div>
            <button>continue</button>
        </div>
    </div>
</body>
</html>
